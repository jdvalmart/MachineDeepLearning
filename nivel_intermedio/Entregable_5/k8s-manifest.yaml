apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-interface
  labels:
    app: ml-interface
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-interface
  template:
    metadata:
      labels:
        app: ml-interface
    spec:
      containers:
        - name: ml-interface
          image: ml-interface:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
            - name: MODEL_PATH
              value: "/app/model.pkl"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ml-interface-service
spec:
  selector:
    app: ml-interface # ✅ CORREGIDO
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort # ✅ mejor para Minikube

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args:
            [
              "redis-server",
              "--maxmemory",
              "128mb",
              "--maxmemory-policy",
              "allkeys-lru",
            ]

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-interface-hpa # ✅ corregido
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-interface
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

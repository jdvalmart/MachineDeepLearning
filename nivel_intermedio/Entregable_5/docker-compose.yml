# docker-compose.yml — Stack completo: ML Inference + Redis
# Entregable 5 · Talento Tech · Sesión 21
#
# Uso:
#   docker-compose up --build              # 1 instancia
#   docker-compose up --build --scale app=3  # 3 instancias + LB
#   docker-compose down

version: "3.9"

services:
  # ──────────────────────────────────────────
  # Microservicio de Inferencia Flask
  # ──────────────────────────────────────────
  app:
    build: .
    ports:
      - "5000-5002:5000" # Rango para múltiples réplicas
    environment:
      - PORT=5000
      - MODEL_PATH=/app/model.pkl
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────
  # Redis — Caché de predicciones
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Nginx — Balanceador de Carga (opcional)
  # Actívalo con: docker-compose --profile load_balancer up
  # ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    profiles: ["load_balancer"]
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

# ──────────────────────────────────────────
# Red interna para comunicación entre servicios
# ──────────────────────────────────────────
networks:
  default:
    name: ml_network
    driver: bridge
